<aside class="sidebar" [class.collapsed]="collapsed" [class.mobile-open]="mobileOpen">
  <div class="sidebar-top">
    <div class="brand">
      <span class="brand-mark">AI</span>
      <span class="brand-name">Workforce</span>
    </div>
    <button type="button" class="icon-btn mobile-close" (click)="closeMobile.emit()" aria-label="Close menu">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
  </div>

  <nav class="nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" (click)="closeMobile.emit()" title="Dashboard">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="8" height="8" rx="1.5" />
        <rect x="13" y="3" width="8" height="5" rx="1.5" />
        <rect x="13" y="11" width="8" height="10" rx="1.5" />
        <rect x="3" y="14" width="8" height="7" rx="1.5" />
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a routerLink="/agents" routerLinkActive="active" class="nav-item" (click)="closeMobile.emit()" title="Agent Studio">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="4" y="8" width="16" height="12" rx="2" />
        <path d="M9 8V6a3 3 0 016 0v2M8 13h.01M16 13h.01" />
      </svg>
      <span class="nav-label">Agent Studio</span>
    </a>
    <a routerLink="/calls" routerLinkActive="active" class="nav-item" (click)="closeMobile.emit()" title="Conversations">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
      </svg>
      <span class="nav-label">Conversations</span>
    </a>
    <a routerLink="/customers" routerLinkActive="active" class="nav-item" (click)="closeMobile.emit()" title="Customers">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
      </svg>
      <span class="nav-label">Customers</span>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <app-theme-toggle [collapsed]="collapsed" />
    <div class="user-row">
      <div class="avatar">{{ initials(auth.currentUser()?.email) }}</div>
      <span class="user-email" [title]="auth.currentUser()?.email">{{ auth.currentUser()?.email }}</span>
      <button type="button" class="icon-btn" (click)="logout.emit()" aria-label="Log out" title="Log out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
        </svg>
      </button>
    </div>
    <button
      type="button"
      class="collapse-btn"
      (click)="collapsedChange.emit(!collapsed)"
      [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        [class.flip]="collapsed"
      >
        <path d="M15 18l-6-6 6-6" />
      </svg>
      <span class="collapse-label">Collapse</span>
    </button>
  </div>
</aside>
