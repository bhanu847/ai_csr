<div class="chart-card">
  <div class="chart-head">
    <h3>Call volume</h3>
    <button type="button" class="btn btn-ghost btn-sm" (click)="showTable.set(!showTable())">
      {{ showTable() ? 'View chart' : 'View as table' }}
    </button>
  </div>

  @if (!showTable()) {
    <svg
      #svgEl
      class="chart-svg"
      [attr.viewBox]="'0 0 ' + width + ' ' + height"
      preserveAspectRatio="none"
      (pointermove)="onPointerMove($event)"
      (pointerleave)="onPointerLeave()"
      role="img"
      aria-label="Call volume over time"
    >
      @for (grid of gridLines(); track grid.y) {
        <line class="grid-line" x1="36" [attr.x2]="width - 12" [attr.y1]="grid.y" [attr.y2]="grid.y" />
        <text class="grid-label" x="30" [attr.y]="grid.y + 3">{{ grid.value }}</text>
      }

      <path class="area-path" [attr.d]="areaPath()" />
      <path class="line-path" [attr.d]="linePath()" />

      @for (tick of xTicks(); track tick.date) {
        <text class="x-label" [attr.x]="tick.x" [attr.y]="height - 6">{{ formatDate(tick.date) }}</text>
      }

      @if (hovered(); as h) {
        <line class="crosshair" [attr.x1]="h.x" [attr.x2]="h.x" y1="16" [attr.y2]="baselineY" />
        <circle class="hover-dot" [attr.cx]="h.x" [attr.cy]="h.y" r="4" />

        <g [attr.transform]="'translate(' + tooltipX() + ',' + tooltipY() + ')'">
          <rect class="tooltip-box" width="84" height="40" rx="6" />
          <text class="tooltip-date" x="10" y="16">{{ formatDate(h.date) }}</text>
          <text class="tooltip-value" x="10" y="32">{{ h.count }} calls</text>
        </g>
      }
    </svg>
  } @else {
    <div class="table-wrap">
      <table class="volume-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Calls</th>
          </tr>
        </thead>
        <tbody>
          @for (point of data; track point.date) {
            <tr>
              <td>{{ formatDate(point.date) }}</td>
              <td>{{ point.count }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
