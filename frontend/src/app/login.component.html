<main class="auth-page">
  <form class="auth-form" (ngSubmit)="onSubmit()">
    <h2>Log in</h2>

    <label>
      Workspace slug
      <input name="tenantSlug" [(ngModel)]="tenantSlug" required placeholder="acme-health" />
    </label>

    <label>
      Email
      <input name="email" type="email" [(ngModel)]="email" required />
    </label>

    <label>
      Password
      <input name="password" type="password" [(ngModel)]="password" required />
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Logging in…' : 'Log in' }}
    </button>

    <p class="switch">No workspace yet? <a routerLink="/register">Create one</a></p>
  </form>
</main>
